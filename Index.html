<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bypass Video Loader</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
  background: linear-gradient(270deg, #141e30, #243b55, #ff4b2b);
  background-size: 600% 600%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.app {
  width: 95%;
  max-width: 520px;
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  text-align: center;
  z-index: 2;
}

h2 { margin: 10px 0 15px; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  margin-bottom: 10px;
}

.results, .history {
  max-height: 120px;
  overflow-y: auto;
  text-align: left;
  margin-top: 10px;
}

.item {
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  margin-bottom: 5px;
}

.item:hover { background: rgba(255,255,255,0.2); }

.video-container {
  margin-top: 15px;
  width: 100%;
  aspect-ratio: 16/9;
  border-radius: 12px;
  overflow: hidden;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.meta { margin-top: 10px; font-size: 14px; opacity: 0.85; }

</style>
</head>
<body>

<div class="app">
  <h2>🎬 Bypass Video Loader</h2>
  <input id="search" placeholder="Paste video/playlist link or search...">
  <div class="results" id="results"></div>
  <div class="video-container" id="player"></div>
  <div class="meta" id="meta"></div>
  <h4>🕘 History</h4>
  <div class="history" id="history"></div>
</div>

<script>
let historyList = JSON.parse(localStorage.getItem("yt_history") || "[]");

function saveHistory(item) {
  historyList.unshift(item);
  historyList = historyList.slice(0, 10);
  localStorage.setItem("yt_history", JSON.stringify(historyList));
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById("history");
  container.innerHTML = historyList.map(v =>
    `<div class="item" onclick="loadVideoOrPlaylist('${v.url}')">${v.title}</div>`
  ).join("");
}

function extractData(url) {
  const videoMatch = url.match(/(?:v=|youtu\.be\/)([^&\n?#]+)/);
  const listMatch = url.match(/[?&]list=([a-zA-Z0-9_-]+)/);
  return { videoId: videoMatch ? videoMatch[1] : null, listId: listMatch ? listMatch[1] : null };
}

function loadVideoOrPlaylist(url) {
  const { videoId, listId } = extractData(url);
  const player = document.getElementById("player");
  const meta = document.getElementById("meta");

  if (listId) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/videoseries?list=${listId}" allowfullscreen></iframe>`;
    meta.textContent = `Playlist Loaded: ${listId}`;
    saveHistory({ url, title: `Playlist: ${listId}` });
  } else if (videoId) {
    player.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}" allowfullscreen></iframe>`;
    meta.textContent = `Video Loaded: ${videoId}`;
    saveHistory({ url, title: `Video: ${videoId}` });
  } else {
    player.innerHTML = "";
    meta.textContent = "Invalid link or search term";
  }
}

async function searchYouTube(query) {
  const res = await fetch(`https://suggestqueries.google.com/complete/search?client=firefox&ds=yt&q=${query}`);
  const data = await res.json();
  const results = data[1].slice(0, 5);
  document.getElementById("results").innerHTML =
    results.map(r =>
      `<div class="item" onclick="searchAndLoad('${r}')">${r}</div>`
    ).join("");
}

async function searchAndLoad(query) {
  try {
    const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${query}`);
    const data = await res.json();
    if (data && data.url) {
      loadVideoOrPlaylist(data.url);
    }
  } catch(e) { console.log(e); }
}

document.getElementById("search").addEventListener("input", function() {
  const val = this.value.trim();
  if (!val) return;
  if (val.includes("youtube.com") || val.includes("youtu.be")) {
    loadVideoOrPlaylist(val);
  } else if (val.length > 2) {
    searchYouTube(val);
  }
});

renderHistory();
</script>
</body>
</html>
